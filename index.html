<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Responsive viewport: essential for all devices (PC, iPhone, Android) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>BGHS 104th · Ramadan responsive</title>
  <!-- modern fonts (Cairo, Amiri, Tajawal) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <!-- font awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ----- RESET & BASE (responsive units) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px; /* base for rem, easy to scale */
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(180deg, #0a0f1e 0%, #1a253b 100%);
      color: white;
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      width: 100%;
      position: relative;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* ----- FALLING STARS (preserved, responsive) ----- */
    .star-field {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .falling-star {
      position: absolute;
      color: #FFE484;
      font-size: clamp(1rem, 4vw, 1.8rem); /* responsive star size */
      opacity: 0.7;
      filter: drop-shadow(0 0 8px gold);
      animation: fall linear infinite;
      top: -50px;
    }
    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.9; }
      100% { transform: translateY(100vh) rotate(20deg); opacity: 0.1; }
    }

    /* cartoon fixed elements (hide on very small to avoid clutter) */
    .eid-crescent {
      position: fixed;
      top: 10px;
      right: 15px;
      font-size: clamp(3rem, 12vw, 6rem);
      z-index: 5;
      opacity: 0.15;
      animation: floatMoon 6s infinite ease-in-out;
      pointer-events: none;
    }
    @keyframes floatMoon {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }
    .camel-left {
      position: fixed;
      bottom: 10px;
      left: max(5px, 2%);
      font-size: clamp(2.5rem, 10vw, 5rem);
      opacity: 0.12;
      z-index: 2;
      transform: scaleX(-1);
    }
    .mosque-right {
      position: fixed;
      bottom: 15px;
      right: max(5px, 2%);
      font-size: clamp(3rem, 12vw, 6rem);
      opacity: 0.1;
      z-index: 2;
    }
    .mosque-left {
      position: fixed;
      top: 120px;
      left: 5px;
      font-size: clamp(2rem, 8vw, 4rem);
      opacity: 0.08;
      z-index: 2;
    }
    /* on very small devices reduce opacity even more or hide? we keep subtle */
    @media (max-width: 480px) {
      .camel-left, .mosque-right, .mosque-left {
        opacity: 0.06;
      }
    }

    /* ----- MAIN CONTAINER (fully responsive) ----- */
    .container {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 15px clamp(10px, 4vw, 30px) 40px;
      position: relative;
      z-index: 20;
    }

    /* ----- HEADER (scales) ----- */
    .header-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .main-title {
      font-family: 'Amiri', serif;
      font-size: clamp(2.5rem, 10vw, 4.5rem);
      font-weight: 700;
      background: linear-gradient(to right, #fcee9f, #f5c842);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 25px #ffbf00;
      line-height: 1.2;
      text-align: center;
    }
    .ramadan-phrase {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(1.2rem, 5vw, 1.9rem);
      color: #c7b27e;
      border-bottom: 2px dashed #f5c84260;
      padding-bottom: 0.5rem;
      margin-top: -0.2rem;
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ----- IFTAR BANNER (fully wraps on mobile) ----- */
    .iftar-special {
      background: #202b41e0;
      backdrop-filter: blur(12px);
      border: 2px solid #f5b81b;
      border-radius: 60px;
      padding: clamp(15px, 3vw, 25px) clamp(15px, 4vw, 35px);
      margin: 20px 0 15px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 15px 25px;
      box-shadow: 0 15px 25px -8px black;
    }
    .date-big {
      font-family: 'Cairo', sans-serif;
      font-weight: 900;
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      color: #ffd966;
      text-shadow: 2px 2px 0 #734e0e;
      white-space: nowrap;
    }
    .date-big i {
      margin-right: 8px;
    }
    .iftar-label {
      font-family: 'Amiri', serif;
      font-size: clamp(1.6rem, 5.5vw, 2.3rem);
      font-weight: 700;
      color: #fff1c1;
    }
    .star-emoji {
      font-size: clamp(1.8rem, 6vw, 2.8rem);
    }
    @media (max-width: 600px) {
      .date-big { white-space: normal; } /* allow wrap if needed */
    }

    /* ----- PAYMENT SINGLE (fully responsive, wraps nicely) ----- */
    .payment-single {
      background: #1f293dc0;
      backdrop-filter: blur(10px);
      border-radius: 70px;
      padding: clamp(15px, 3.5vw, 25px) clamp(15px, 4vw, 35px);
      margin: 25px 0 20px;
      border: 2px solid #f5b81b;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 18px 25px;
    }
    .number-big {
      font-family: 'Cairo', sans-serif;
      font-weight: 900;
      font-size: clamp(1.5rem, 5vw, 2.6rem);
      background: #0f172a;
      padding: 10px 25px;
      border-radius: 70px;
      border: 2px solid #fbbf24;
      color: #ffe484;
      letter-spacing: 1px;
      text-align: center;
      word-break: break-word;
    }
    .method-tags {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .method-tags span {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(1.3rem, 4vw, 1.9rem);
      font-weight: 700;
      background: #2d3a4e;
      padding: 8px 20px;
      border-radius: 50px;
      border: 1px solid #f5b81b;
      color: #ffe788;
      box-shadow: 0 4px 0 #734e0e;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    @media (max-width: 480px) {
      .method-tags span { white-space: normal; }
    }

    /* ----- STATS CARDS (responsive flex) ----- */
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 30px 0 15px;
    }
    .stat-card {
      flex: 1 1 200px;
      min-width: 160px;
      background: rgba(10, 20, 30, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid #fbbf2450;
      border-radius: 40px;
      padding: 20px 10px;
      text-align: center;
      transition: 0.2s;
    }
    .stat-number {
      font-family: 'Cairo', sans-serif;
      font-weight: 900;
      font-size: clamp(2.5rem, 8vw, 3.8rem);
      background: linear-gradient(135deg, #fd9, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    /* ----- BUTTONS (responsive, fat fingers) ----- */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin: 25px 0 20px;
    }
    .btn-cartoon {
      font-family: 'Tajawal', sans-serif;
      background: #fbbf24;
      border: none;
      padding: 16px 30px;
      border-radius: 60px;
      font-weight: 900;
      font-size: clamp(1.3rem, 5vw, 1.8rem);
      color: #0f172a;
      box-shadow: 0 8px 0 #b45309, 0 8px 20px black;
      cursor: pointer;
      transition: 0.1s ease;
      border: 2px solid #ffecaa;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 200px;
      justify-content: center;
    }
    .btn-cartoon:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #b45309, 0 8px 20px black;
    }
    .btn-outline-camel {
      background: #302b1d;
      color: #fbbf24;
      box-shadow: 0 6px 0 #5f4a1a;
      border: 2px solid #fbbf24;
    }
    @media (max-width: 480px) {
      .btn-cartoon {
        width: 100%;
        min-width: unset;
        padding: 16px 20px;
      }
    }

    /* ----- LIST WRAPPER (scrollable, mobile friendly) ----- */
    .recent-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 15px;
    }
    .recent-col {
      flex: 1 1 280px;
    }
    .list-wrapper {
      background: #00000030;
      border-radius: 40px;
      padding: 15px;
      margin-top: 8px;
      border: 1px solid #fbbf2460;
      max-height: 250px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch; /* smooth on iOS */
    }
    .list-item {
      background: #1f2a3f;
      border-radius: 50px;
      padding: 12px 16px;
      margin: 8px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 7px solid #fbbf24;
      font-size: clamp(0.9rem, 3.5vw, 1rem);
      word-break: break-word;
      gap: 10px;
    }
    .paid-badge {
      background: #15803d;
      padding: 5px 14px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.8rem;
      white-space: nowrap;
    }

    /* ----- MODAL (touch friendly) ----- */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 15px;
    }
    .modal-card {
      background: #1f2a3f;
      border: 3px solid #fbbf24;
      border-radius: 60px;
      padding: 30px 25px;
      max-width: 460px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-card input {
      width: 100%;
      padding: 16px 20px;
      margin: 12px 0;
      border-radius: 50px;
      border: 1px solid #fbbf24;
      background: #0f172a;
      color: white;
      font-size: 1rem;
      font-family: 'Cairo', sans-serif;
    }
    .modal-card .btn-cartoon {
      width: 100%;
      margin: 8px 0;
    }

    /* ----- FOOTER ----- */
    .footer {
      font-family: 'Amiri', serif;
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      color: #ad9b74;
      margin-top: 45px;
      border-top: 1px solid #fbbf2440;
      padding: 20px 0 10px;
      text-align: center;
    }

    /* small touch: ensure no overflow */
    img, svg, i {
      max-width: 100%;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<!-- falling stars (responsive) -->
<div class="star-field" id="starField"></div>

<!-- cartoon fixed elements -->
<div class="eid-crescent">🌙</div>
<div class="camel-left">🐪</div>
<div class="mosque-right">🕌</div>
<div class="mosque-left">⛩️</div>

<div class="container">
  <!-- header -->
  <div class="header-box">
    <div class="main-title">BGHS 104th <span>🐪</span></div>
    <div class="ramadan-phrase"><i class="fas fa-star-and-crescent"></i> Ramadan Kareem <i class="fas fa-mosque"></i></div>
  </div>

  <!-- IFTAR GATHERING DATE (fully responsive) -->
  <div class="iftar-special">
    <span class="date-big"><i class="fas fa-calendar-alt"></i> 18 March, 2026</span>
    <span class="iftar-label">Iftar Gathering</span>
    <span class="star-emoji">✨🏮✨</span>
  </div>

  <!-- PAYMENT SINGLE: number once + methods beside (responsive) -->
  <div class="payment-single">
    <span class="number-big">01788377506</span>
    <div class="method-tags">
      <span><i class="fab fa-bkash"></i> bKash</span>
      <span><i class="fas fa-hand-holding-heart"></i> Nagad</span>
      <span><i class="fas fa-rocket"></i> Rocket</span>
    </div>
  </div>

  <!-- totals cards -->
  <div class="stats-row">
    <div class="stat-card">
      <div style="font-size:1.3rem;"><i class="fas fa-globe"></i> Online</div>
      <div class="stat-number" id="onlineTotal">0</div>
      <div>Taka</div>
    </div>
    <div class="stat-card">
      <div style="font-size:1.3rem;"><i class="fas fa-hand-holding-usd"></i> Offline</div>
      <div class="stat-number" id="offlineTotal">0</div>
      <div>Taka</div>
    </div>
  </div>

  <!-- buttons (big, touch-friendly) -->
  <div class="btn-group">
    <button class="btn-cartoon" onclick="openModal('onlineModal')"><i class="fas fa-plus-circle"></i> Online Payment</button>
    <button class="btn-cartoon btn-outline-camel" onclick="openModal('offlineModal')"><i class="fas fa-wallet"></i> Offline Payment</button>
  </div>

  <!-- recent lists (responsive columns) -->
  <div class="recent-grid">
    <div class="recent-col">
      <h3 style="color:#f5b81b;"><i class="fas fa-star"></i> Online recent</h3>
      <div class="list-wrapper" id="onlineList"></div>
    </div>
    <div class="recent-col">
      <h3 style="color:#f5b81b;"><i class="fas fa-moon"></i> Offline recent</h3>
      <div class="list-wrapper" id="offlineList"></div>
    </div>
  </div>

  <div class="footer">
    <span>🌙 Ramadan 1447 · BGHS 104th · Iftar 18 March 🐪🕌</span>
  </div>
</div>

<!-- MODALS (responsive) -->
<div id="onlineModal" class="modal">
  <div class="modal-card">
    <h2 style="color:#fbbf24; font-family:'Amiri';">📱 Online</h2>
    <input id="onName" placeholder="Name">
    <input id="onDigit" placeholder="Last 3 digit">
    <input id="onAmount" placeholder="Amount (Tk)" type="number">
    <input id="onPass" placeholder="Admin pass" type="password">
    <button class="btn-cartoon" onclick="addOnline()">Add payment</button>
    <button class="btn-cartoon btn-outline-camel" onclick="closeModal('onlineModal')">Close</button>
  </div>
</div>

<div id="offlineModal" class="modal">
  <div class="modal-card">
    <h2 style="color:#fbbf24; font-family:'Amiri';">📦 Offline</h2>
    <input id="offName" placeholder="Name">
    <input id="offDigit" placeholder="Last 3 digit">
    <input id="offAmount" placeholder="Amount" type="number">
    <input id="offPass" placeholder="Admin pass" type="password">
    <button class="btn-cartoon" onclick="addOffline()">Add payment</button>
    <button class="btn-cartoon btn-outline-camel" onclick="closeModal('offlineModal')">Close</button>
  </div>
</div>

<!-- Firebase module (unchanged but fully compatible) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA5CcSMcsrVxqLRImYA_nFGP2LealHHxKM",
    authDomain: "bghs-104th.firebaseapp.com",
    projectId: "bghs-104th",
    storageBucket: "bghs-104th.firebasestorage.app",
    messagingSenderId: "826702629393",
    appId: "G-2LHDS1CQ17"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const ADMIN_PASS = "104";

  window.openModal = (id) => document.getElementById(id).style.display = 'flex';
  window.closeModal = (id) => document.getElementById(id).style.display = 'none';

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"]/g, (m) => {
      if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; if (m === '"') return '&quot;'; return m;
    });
  }

  window.addOnline = async () => {
    if (document.getElementById('onPass').value !== ADMIN_PASS) { alert('Wrong password'); return; }
    const name = document.getElementById('onName').value.trim();
    let digit = document.getElementById('onDigit').value.trim();
    const amount = parseInt(document.getElementById('onAmount').value);
    if (!name || !digit || !amount) { alert('Fill all'); return; }
    if (digit.length > 5) digit = digit.slice(-3);
    await addDoc(collection(db, 'online'), { name, digit, amount });
    document.getElementById('onName').value = ''; document.getElementById('onDigit').value = ''; document.getElementById('onAmount').value = ''; document.getElementById('onPass').value = '';
    loadData();
    closeModal('onlineModal');
    alert('✅ added');
  };

  window.addOffline = async () => {
    if (document.getElementById('offPass').value !== ADMIN_PASS) { alert('Wrong password'); return; }
    const name = document.getElementById('offName').value.trim();
    let digit = document.getElementById('offDigit').value.trim();
    const amount = parseInt(document.getElementById('offAmount').value);
    if (!name || !digit || !amount) { alert('Fill all'); return; }
    if (digit.length > 5) digit = digit.slice(-3);
    await addDoc(collection(db, 'offline'), { name, digit, amount });
    document.getElementById('offName').value = ''; document.getElementById('offDigit').value = ''; document.getElementById('offAmount').value = ''; document.getElementById('offPass').value = '';
    loadData();
    closeModal('offlineModal');
    alert('✅ recorded');
  };

  async function loadData() {
    let onlineSum = 0, offlineSum = 0;
    const onlineDiv = document.getElementById('onlineList');
    const offlineDiv = document.getElementById('offlineList');
    onlineDiv.innerHTML = ''; offlineDiv.innerHTML = '';

    const onSnap = await getDocs(collection(db, 'online'));
    onSnap.forEach(d => {
      const dat = d.data();
      onlineSum += dat.amount;
      onlineDiv.innerHTML += `<div class="list-item"><span>${esc(dat.name)} (${esc(dat.digit)})</span> <span class="paid-badge">PAID</span></div>`;
    });
    const offSnap = await getDocs(collection(db, 'offline'));
    offSnap.forEach(d => {
      const dat = d.data();
      offlineSum += dat.amount;
      offlineDiv.innerHTML += `<div class="list-item"><span>${esc(dat.name)} (${esc(dat.digit)})</span> <span class="paid-badge">PAID</span></div>`;
    });

    document.getElementById('onlineTotal').innerText = onlineSum;
    document.getElementById('offlineTotal').innerText = offlineSum;
  }

  loadData();

  window.addEventListener('click', (e) => {
    if (e.target.classList.contains('modal')) e.target.style.display = 'none';
  });

  // falling stars generator (responsive)
  function createStar() {
    const field = document.getElementById('starField');
    const star = document.createElement('div');
    star.className = 'falling-star';
    star.innerHTML = Math.random() > 0.5 ? '✨' : '★';
    star.style.left = Math.random() * 100 + '%';
    star.style.animationDuration = (Math.random() * 4 + 3) + 's';
    star.style.fontSize = (Math.random() * 1.2 + 0.9) + 'rem';
    star.style.opacity = Math.random() * 0.6 + 0.2;
    field.appendChild(star);
    setTimeout(() => star.remove(), 8000);
  }
  setInterval(createStar, 400);
</script>
</body>
</html>
